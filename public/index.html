<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otto · Call Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Spline+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #15120d;
        --bg-2: #1b1711;
        --ink: #f0e8da;
        --muted: #9b8f7d;
        --faint: #6b6253;
        --line: rgba(240, 232, 218, 0.09);
        --accent: #e3a24f; /* amber/copper */
        --accent-soft: rgba(227, 162, 79, 0.16);
        --accent-glow: rgba(227, 162, 79, 0.45);
        --serif: "Fraunces", Georgia, serif;
        --body: "Spline Sans", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--body);
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* ambient warmth that intensifies while Otto speaks */
      .ambient {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(120% 90% at 50% 8%, rgba(227, 162, 79, 0.10), transparent 55%),
          radial-gradient(140% 100% at 50% 120%, rgba(227, 162, 79, 0.06), transparent 60%),
          linear-gradient(180deg, var(--bg), var(--bg-2));
        transition: opacity 0.6s ease;
      }
      .ambient::after {
        content: ""; position: absolute; inset: 0;
        background: radial-gradient(60% 50% at 50% 30%, var(--accent-glow), transparent 70%);
        opacity: 0; transition: opacity 0.5s ease;
      }
      body[data-state="thinking"] .ambient::after { opacity: 0.12; }
      body[data-state="speaking"] .ambient::after { opacity: 0.5; animation: breathe 2.4s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: 0.4; } 50% { opacity: 0.62; } }

      .wrap {
        position: relative; z-index: 1;
        height: 100vh; max-width: 880px; margin: 0 auto;
        padding: 26px 30px 30px;
        display: grid; grid-template-rows: auto auto 1fr auto; gap: 0;
      }

      /* header */
      header { display: flex; align-items: center; justify-content: space-between; }
      .live { display: inline-flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em; color: var(--muted); }
      .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); animation: blink 2.4s ease-in-out infinite; }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
      .routing { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em; color: var(--faint); text-align: right; }
      .routing b { color: var(--muted); font-weight: 500; }

      /* hero presence */
      .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0 24px; }
      .name { font-family: var(--serif); font-size: 58px; font-weight: 500; font-optical-sizing: auto; letter-spacing: -0.015em; line-height: 1; }
      .name em { font-style: italic; color: var(--accent); }
      .state { margin-top: 14px; font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); transition: color 0.4s; }
      body[data-state="speaking"] .state { color: var(--accent); }

      /* waveform */
      .wave { display: flex; align-items: center; justify-content: center; gap: 7px; height: 92px; margin-top: 26px; }
      .wave span {
        width: 6px; height: 14px; border-radius: 4px;
        background: var(--muted); opacity: 0.5;
        transform-origin: center;
      }
      /* listening — gentle, slow idle */
      body[data-state="listening"] .wave span { animation: idle 2.8s ease-in-out infinite; background: var(--muted); }
      body[data-state="listening"] .wave span:nth-child(2) { animation-delay: 0.2s; }
      body[data-state="listening"] .wave span:nth-child(3) { animation-delay: 0.4s; }
      body[data-state="listening"] .wave span:nth-child(4) { animation-delay: 0.6s; }
      body[data-state="listening"] .wave span:nth-child(5) { animation-delay: 0.4s; }
      body[data-state="listening"] .wave span:nth-child(6) { animation-delay: 0.2s; }
      @keyframes idle { 0%,100% { height: 12px; opacity: 0.4; } 50% { height: 26px; opacity: 0.6; } }
      /* thinking — a scanning shimmer */
      body[data-state="thinking"] .wave span { background: var(--accent); animation: think 1.1s ease-in-out infinite; }
      body[data-state="thinking"] .wave span:nth-child(1) { animation-delay: 0s; }
      body[data-state="thinking"] .wave span:nth-child(2) { animation-delay: 0.12s; }
      body[data-state="thinking"] .wave span:nth-child(3) { animation-delay: 0.24s; }
      body[data-state="thinking"] .wave span:nth-child(4) { animation-delay: 0.36s; }
      body[data-state="thinking"] .wave span:nth-child(5) { animation-delay: 0.48s; }
      body[data-state="thinking"] .wave span:nth-child(6) { animation-delay: 0.6s; }
      body[data-state="thinking"] .wave span:nth-child(7) { animation-delay: 0.72s; }
      @keyframes think { 0%,100% { height: 10px; opacity: 0.25; } 50% { height: 20px; opacity: 0.9; } }
      /* speaking — tall, bold, alive */
      body[data-state="speaking"] .wave span {
        background: var(--accent);
        box-shadow: 0 0 14px var(--accent-glow);
        animation: talk 0.5s ease-in-out infinite;
      }
      body[data-state="speaking"] .wave span:nth-child(1) { animation-delay: 0.00s; }
      body[data-state="speaking"] .wave span:nth-child(2) { animation-delay: 0.18s; }
      body[data-state="speaking"] .wave span:nth-child(3) { animation-delay: 0.07s; }
      body[data-state="speaking"] .wave span:nth-child(4) { animation-delay: 0.24s; }
      body[data-state="speaking"] .wave span:nth-child(5) { animation-delay: 0.10s; }
      body[data-state="speaking"] .wave span:nth-child(6) { animation-delay: 0.21s; }
      body[data-state="speaking"] .wave span:nth-child(7) { animation-delay: 0.04s; }
      @keyframes talk { 0%,100% { height: 12px; opacity: 0.7; } 50% { height: 64px; opacity: 1; } }

      /* transcript */
      .feed { overflow-y: auto; padding: 8px 2px 0; mask-image: linear-gradient(180deg, transparent, #000 32px); }
      .feed::-webkit-scrollbar { width: 6px; }
      .feed::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
      .row { display: flex; gap: 12px; padding: 7px 0; animation: rise 0.45s cubic-bezier(0.2,0.8,0.2,1) both; }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .who { flex: 0 0 84px; text-align: right; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--faint); padding-top: 2px; }
      .said { font-size: 15.5px; line-height: 1.5; color: var(--ink); }
      .row.speech .said { color: #d7cdba; }
      .row.agent { padding: 11px 0; }
      .row.agent .who { color: var(--accent); }
      .row.agent .said {
        position: relative; padding-left: 14px;
        font-family: var(--serif); font-size: 17px; font-style: italic; color: #fbeedd;
      }
      .row.agent .said::before { content: ""; position: absolute; left: 0; top: 3px; bottom: 3px; width: 2px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 10px var(--accent-glow); }
      .chip { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: 9.5px; font-style: normal; letter-spacing: 0.05em; color: var(--accent); border: 1px solid var(--accent-soft); border-radius: 999px; padding: 1px 7px; vertical-align: middle; }
      .empty { color: var(--faint); font-size: 14px; text-align: center; padding-top: 28px; font-style: italic; font-family: var(--serif); }

      footer { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: var(--faint); text-align: center; padding-top: 14px; border-top: 1px solid var(--line); }
      footer b { color: var(--muted); font-weight: 500; }
    </style>
  </head>
  <body data-state="listening">
    <div class="ambient"></div>
    <div class="wrap">
      <header>
        <span class="live"><span class="dot"></span> LIVE · RECORDING</span>
        <span class="routing" id="routing"></span>
      </header>

      <div class="hero">
        <div class="name">Ott<em>o</em></div>
        <div class="state" id="stateLabel">listening</div>
        <div class="wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      </div>

      <div class="feed" id="feed"><div class="empty">the room is quiet…</div></div>

      <footer>anyone on the call can say <b id="wake">“Otto, …”</b></footer>
    </div>

    <script>
      const body = document.body;
      const feed = document.getElementById("feed");
      const stateLabel = document.getElementById("stateLabel");
      const STATE_WORDS = { listening: "listening", thinking: "thinking", speaking: "speaking" };
      let empty = true;

      function addLine(ev) {
        if (empty) { feed.innerHTML = ""; empty = false; }
        const row = document.createElement("div");
        row.className = "row " + (ev.kind === "agent" ? "agent" : "speech");
        const who = document.createElement("div");
        who.className = "who";
        who.textContent = ev.speaker;
        const said = document.createElement("div");
        said.className = "said";
        said.textContent = ev.text;
        if (ev.kind === "agent" && ev.searched) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = "🌐 " + (ev.sources && ev.sources[0] ? ev.sources[0] : "web");
          said.appendChild(chip);
        }
        row.appendChild(who);
        row.appendChild(said);
        feed.appendChild(row);
        feed.scrollTop = feed.scrollHeight;
      }

      function handle(ev) {
        if (ev.type === "state") {
          body.dataset.state = ev.state;
          stateLabel.textContent = STATE_WORDS[ev.state] || ev.state;
        } else if (ev.type === "line") {
          addLine(ev);
        } else if (ev.type === "meta") {
          document.getElementById("routing").innerHTML =
            `call mic <b>${ev.callMic}</b> · monitor <b>${ev.monitor}</b>`;
          document.getElementById("wake").textContent = `“${ev.agentName}, …”`;
        }
      }

      // Preview mode (for design review): /?preview&state=speaking — seeds sample
      // content and forces a state, without needing the live agent.
      const params = new URLSearchParams(location.search);
      if (params.has("preview")) {
        handle({ type: "meta", agentName: "Otto", callMic: "BlackHole 2ch", monitor: "Otto Monitor" });
        handle({ type: "line", kind: "speech", speaker: "Priya", text: "Are we still targeting the 15th for the Q3 launch?" });
        handle({ type: "line", kind: "speech", speaker: "Marcus", text: "Yeah, pending the capital budget sign-off." });
        handle({ type: "line", kind: "speech", speaker: "You", text: "Otto, what's the USD to EUR rate right now?" });
        handle({ type: "line", kind: "agent", speaker: "Otto", text: "It's about 1.08 dollars per euro.", searched: true, sources: ["xe.com"] });
        handle({ type: "state", state: params.get("state") || "speaking" });
      } else {
        const es = new EventSource("/events");
        es.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch {} };
      }
    </script>
  </body>
</html>
