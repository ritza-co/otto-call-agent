<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f5f2" />
    <title>Otto · Meeting Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400..600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f6f5f2;
        --surface: #ffffff;
        --ink: #1c1f23;
        --muted: #686e76;
        --faint: #9aa0a6;
        --line: #e8e5de;
        --line-2: #dcd8cf;
        --accent: #0e7b62;
        --accent-ink: #0a5a48;
        --accent-soft: #e7f1ee;
        --amber: #b8722a;
        --serif: "Source Serif 4", Georgia, serif;
        --sans: "Public Sans", system-ui, sans-serif;
        --mono: "IBM Plex Mono", monospace;
        --shadow: 0 1px 2px rgba(28, 31, 35, 0.04), 0 4px 16px -8px rgba(28, 31, 35, 0.1);
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body { font-family: var(--sans); background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
      ::selection { background: var(--accent-soft); }

      .app { display: grid; grid-template-columns: 304px 1fr; height: 100vh; }

      /* ---------- sidebar ---------- */
      .sidebar { background: var(--surface); border-right: 1px solid var(--line); display: flex; flex-direction: column; min-height: 0; }
      .brand { display: flex; align-items: center; gap: 10px; padding: 20px 22px 16px; }
      .brand .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--accent); display: grid; place-items: center; color: #fff; font-family: var(--serif); font-weight: 600; font-size: 15px; }
      .brand h1 { font-family: var(--serif); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
      .brand .sub { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--faint); }

      .session-row { padding: 4px 16px 14px; }
      .session-btn {
        width: 100%; font-family: var(--sans); font-size: 13.5px; font-weight: 600;
        border: 1px solid var(--accent); color: #fff; background: var(--accent);
        border-radius: 9px; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .session-btn:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
      .session-btn[data-active="false"] { background: var(--surface); color: var(--accent); }
      .session-btn[data-active="false"]:hover { background: var(--accent-soft); }
      .session-btn .rec { width: 8px; height: 8px; border-radius: 50%; background: #fff; }
      .session-btn[data-active="false"] .rec { background: var(--accent); }

      .mic-row { padding: 0 16px 12px; display: flex; align-items: center; gap: 8px; }
      .mic-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
      .mic-select { flex: 1; font-family: var(--sans); font-size: 12px; color: var(--ink); background: var(--paper); border: 1px solid var(--faint); border-radius: 7px; padding: 5px 8px; cursor: pointer; min-width: 0; }
      .mic-select:focus { outline: none; border-color: var(--accent); }
      .search { padding: 0 16px 12px; }
      .search input {
        width: 100%; font-family: var(--sans); font-size: 13px; color: var(--ink);
        border: 1px solid var(--line-2); border-radius: 8px; padding: 8px 11px; background: var(--paper);
      }
      .search input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
      .list-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); padding: 4px 22px 8px; }

      .meeting-list { overflow-y: auto; padding: 0 10px 14px; flex: 1; min-height: 0; }
      .meeting { display: block; width: 100%; text-align: left; border: 1px solid transparent; background: transparent; border-radius: 9px; padding: 11px 12px; cursor: pointer; }
      .meeting:hover { background: var(--paper); }
      .meeting.active { background: var(--accent-soft); border-color: rgba(14, 123, 98, 0.22); }
      .meeting .m-top { display: flex; align-items: center; gap: 7px; }
      .meeting .m-title { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .meeting .m-meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 4px; letter-spacing: 0.02em; display: flex; gap: 8px; flex-wrap: wrap; }
      .meeting .sum-dot { color: var(--accent); }
      .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; box-shadow: 0 0 0 0 rgba(14,123,98,0.4); animation: pulse 2s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(14,123,98,0.4); } 70% { box-shadow: 0 0 0 6px rgba(14,123,98,0); } 100% { box-shadow: 0 0 0 0 rgba(14,123,98,0); } }
      .list-empty { color: var(--faint); font-size: 13px; padding: 16px 22px; font-style: italic; }

      /* ---------- main ---------- */
      .main { overflow-y: auto; }
      .record { max-width: 820px; margin: 0 auto; padding: 30px 40px 60px; }

      .rec-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--line); }
      .rec-title { font-family: var(--serif); font-size: 27px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }
      .rec-meta { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 8px; letter-spacing: 0.03em; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .status { display: inline-flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
      .status .s-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
      .status[data-state="listening"] .s-dot { background: var(--accent); }
      .status[data-state="thinking"] .s-dot { background: var(--amber); animation: blink 1s infinite; }
      .status[data-state="speaking"] .s-dot { background: var(--accent); animation: blink 0.7s infinite; }
      @keyframes blink { 50% { opacity: 0.3; } }

      .actions { display: flex; gap: 9px; flex: 0 0 auto; }
      .btn { font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 8px; padding: 8px 14px; cursor: pointer; border: 1px solid var(--line-2); background: var(--surface); color: var(--ink); white-space: nowrap; transition: border-color 0.15s, background 0.15s, color 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; }
      .btn:hover { border-color: var(--accent); color: var(--accent-ink); }
      .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      .btn.primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); color: #fff; }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .btn.muted { background: #b3422f; border-color: #b3422f; color: #fff; }
      .btn.muted:hover { background: #9a3727; border-color: #9a3727; color: #fff; }
      .muted-chip { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; color: #b3422f; }
      .mute-banner { display: flex; align-items: center; gap: 14px; background: #3d1a12; border: 1.5px solid #b3422f; border-radius: 10px; padding: 14px 20px; margin-top: 18px; }
      .mute-banner-icon { font-size: 22px; flex: 0 0 auto; }
      .mute-banner-body { flex: 1; }
      .mute-banner-title { font-family: var(--sans); font-size: 14px; font-weight: 700; color: #f07a68; letter-spacing: 0.01em; }
      .mute-banner-sub { font-family: var(--mono); font-size: 11.5px; color: #c97a6e; margin-top: 3px; letter-spacing: 0.02em; }
      .mute-banner-btn { font-family: var(--sans); font-size: 12px; font-weight: 700; background: #b3422f; border: 1px solid #c95441; color: #fff; border-radius: 7px; padding: 7px 14px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
      .mute-banner-btn:hover { background: #9a3727; }

      .section { margin-top: 26px; }
      .section-h { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--faint); margin-bottom: 12px; }

      .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); }
      .summary-card { padding: 20px 22px; }
      .summary-empty { color: var(--muted); font-size: 14px; line-height: 1.6; }
      .summary-body h4 { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--accent-ink); text-transform: uppercase; letter-spacing: 0.04em; margin: 16px 0 7px; }
      .summary-body h4:first-child { margin-top: 0; }
      .summary-body p { font-size: 14.5px; line-height: 1.6; color: var(--ink); margin: 0 0 8px; }
      .summary-body ul { margin: 0 0 8px; padding-left: 18px; }
      .summary-body li { font-size: 14px; line-height: 1.6; margin-bottom: 4px; }
      .summary-body strong { font-weight: 600; }

      .transcript { padding: 8px 4px; }
      .t-row { display: flex; gap: 14px; padding: 9px 18px; }
      .t-who { flex: 0 0 92px; text-align: right; font-family: var(--mono); font-size: 11px; color: var(--muted); padding-top: 2px; letter-spacing: 0.02em; }
      .t-said { font-size: 14.5px; line-height: 1.55; color: #2a2e33; }
      .t-row.agent { background: var(--accent-soft); border-radius: 8px; margin: 2px 6px; padding: 10px 12px; }
      .t-row.agent .t-who { color: var(--accent-ink); font-weight: 500; }
      .t-row.agent .t-said { color: #143f34; }
      .chip { display: inline-block; margin-left: 8px; font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.04em; color: var(--accent-ink); background: #d9ebe5; border-radius: 999px; padding: 1px 7px; vertical-align: middle; }
      .t-interim { opacity: 0.55; font-style: italic; }
      .empty { color: var(--faint); font-size: 14px; font-style: italic; padding: 26px 18px; text-align: center; }

      .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; font-size: 13px; padding: 9px 16px; border-radius: 8px; box-shadow: var(--shadow); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
      .toast.show { opacity: 1; }

      @media (max-width: 760px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } .record { padding: 22px; } }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="mark">O</span>
          <div>
            <h1>Otto</h1>
            <div class="sub">Meeting Records</div>
          </div>
        </div>
        <div class="session-row">
          <button class="session-btn" id="sessionBtn" data-active="true"><span class="rec"></span> End session</button>
        </div>
        <div class="mic-row">
          <label class="mic-label">Mic</label>
          <select id="micSelect" class="mic-select"></select>
        </div>
        <div class="search"><input id="search" type="search" placeholder="Search meetings…" /></div>
        <div class="list-label">Meetings</div>
        <div class="meeting-list" id="meetingList"></div>
      </aside>
      <main class="main"><div class="record" id="record"></div></main>
    </div>
    <div class="toast" id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const meetingList = $("meetingList"), record = $("record"), sessionBtn = $("sessionBtn"), searchInput = $("search"), toastEl = $("toast"), micSelect = $("micSelect");

      let agentName = "Otto";
      let meetings = [];          // from /sessions
      let active = true;          // session running
      let currentId = null;       // live session file id
      let selectedId = null;      // meeting being viewed (null = live)
      let ottoState = "listening";
      let liveLines = [];         // {kind,speaker,text,searched,sources}
      let interimText = "";
      let muted = false;          // your mic muted into Otto + the call
      let liveSummary = null;     // summary text for the current live session, set after summarize
      let activeMicDevice = "";

      const esc = (s) => (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const mdInline = (s) => s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      function toast(msg) { toastEl.textContent = msg; toastEl.classList.add("show"); clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove("show"), 2200); }

      const viewingLive = () => selectedId === null || selectedId === currentId;

      // ---------- sidebar ----------
      function renderList() {
        const q = searchInput.value.trim().toLowerCase();
        const rows = meetings.filter((m) => !q || m.title.toLowerCase().includes(q) || m.date.includes(q));
        if (!rows.length) { meetingList.innerHTML = '<div class="list-empty">No meetings yet.</div>'; return; }
        meetingList.innerHTML = "";
        for (const m of rows) {
          const isLive = active && m.id === currentId;
          const sel = (selectedId === null && isLive) || selectedId === m.id;
          const el = document.createElement("button");
          el.className = "meeting" + (sel ? " active" : "");
          el.innerHTML =
            `<div class="m-top">${isLive ? '<span class="live-dot"></span>' : ""}<span class="m-title">${esc(isLive ? "Live meeting" : m.title.replace(/^(Meeting|Call) — /, ""))}</span></div>` +
            `<div class="m-meta"><span>${m.date || ""}</span><span>${m.lines} lines</span>${m.hasSummary ? '<span class="sum-dot">● summary</span>' : ""}</div>`;
          el.onclick = () => { selectedId = isLive ? null : m.id; renderList(); renderMain(); };
          meetingList.appendChild(el);
        }
      }
      async function refreshList() {
        try { meetings = await (await fetch("/sessions")).json(); } catch { meetings = []; }
        renderList();
      }

      // ---------- transcript / summary rendering ----------
      function transcriptRow(speaker, text, searched, sources, interim) {
        const agent = speaker === agentName;
        const chip = agent && searched ? `<span class="chip">🌐 ${esc((sources && sources[0]) || "web")}</span>` : "";
        return `<div class="t-row ${agent ? "agent" : ""}${interim ? " t-interim" : ""}"><div class="t-who">${esc(speaker)}</div><div class="t-said">${esc(text)}${chip}</div></div>`;
      }
      function parseTranscript(md) {
        const blocks = md.split(/\n\n+/).map((b) => b.trim()).filter(Boolean);
        let html = "";
        for (const b of blocks) {
          if (b.startsWith("# ")) continue;
          const m = b.match(/^\*\*(.+?):\*\*\s*([\s\S]*)$/);
          if (m) html += transcriptRow(m[1], m[2], false, null, false);
          else html += `<div class="t-row"><div class="t-said">${esc(b)}</div></div>`;
        }
        return html || '<div class="empty">No transcript yet.</div>';
      }
      function renderSummary(md) {
        const lines = md.split("\n");
        let html = "", inList = false;
        for (const raw of lines) {
          const line = raw.trim();
          if (/^#{1,3}\s+/.test(line)) { if (inList) { html += "</ul>"; inList = false; } html += `<h4>${esc(line.replace(/^#{1,3}\s+/, ""))}</h4>`; }
          else if (/^[-*]\s+/.test(line)) { if (!inList) { html += "<ul>"; inList = true; } html += `<li>${mdInline(esc(line.replace(/^[-*]\s+/, "")))}</li>`; }
          else if (line === "") { if (inList) { html += "</ul>"; inList = false; } }
          else { if (inList) { html += "</ul>"; inList = false; } html += `<p>${mdInline(esc(line))}</p>`; }
        }
        if (inList) html += "</ul>";
        return html;
      }

      // ---------- main panel ----------
      function headerHtml(title, metaInner, opts) {
        const id = opts.id;
        const summarizeLabel = opts.hasSummary ? "Re-summarize" : "Summarize meeting";
        const summarize = id ? `<button class="btn primary" id="summarizeBtn">${summarizeLabel}</button>` : "";
        const download = id ? `<a class="btn" href="/download?id=${encodeURIComponent(id)}" download>Download .md</a>` : "";
        const mute = opts.live ? `<button class="btn${muted ? " muted" : ""}" id="muteBtn">${muted ? "Unmute" : "Mute"}</button>` : "";
        const end = opts.live ? `<button class="btn" id="endBtn">End session</button>` : "";
        return `<div class="rec-head"><div><div class="rec-title">${esc(title)}</div><div class="rec-meta">${metaInner}</div></div><div class="actions">${summarize}${mute}${download}${end}</div></div>`;
      }

      function renderMain() {
        if (viewingLive()) return renderLive();
        renderRecord(selectedId);
      }

      function renderLive() {
        const m = meetings.find((x) => x.id === currentId);
        const statusPill = active
          ? `<span class="status" data-state="${ottoState}"><span class="s-dot"></span>${agentName} · ${ottoState}</span>`
          : `<span class="status"><span class="s-dot"></span>session ended</span>`;
        const meta = `${statusPill}<span>say "${esc(agentName)}, …" to ask</span>`;
        const header = headerHtml("Live meeting", meta, { id: active ? currentId : currentId, live: active, hasSummary: m && m.hasSummary });
        const muteBanner = muted ? `<div class="mute-banner">
          <div class="mute-banner-icon">🔇</div>
          <div class="mute-banner-body">
            <div class="mute-banner-title">You are muted</div>
            <div class="mute-banner-sub">${esc(agentName)} cannot hear you &mdash; and neither can your call participants</div>
          </div>
          <button class="mute-banner-btn" id="unmuteBannerBtn">Unmute</button>
        </div>` : "";
        let body = liveLines.map((l) => transcriptRow(l.speaker, l.text, l.searched, l.sources, false)).join("");
        if (interimText) body += transcriptRow(agentName === "" ? "" : "…", interimText, false, null, true);
        if (!body) body = '<div class="empty">Listening… start talking, or say "' + esc(agentName) + ', …".</div>';
        const summaryHtml = liveSummary
          ? `<div class="card summary-card"><div class="summary-body">${renderSummary(liveSummary)}</div></div>`
          : `<div class="card summary-card"><div class="summary-empty">No summary yet. Generate one with <strong>Summarize meeting</strong>.</div></div>`;
        record.innerHTML =
          header +
          muteBanner +
          `<div class="section"><div class="section-h">Summary</div>${summaryHtml}</div>` +
          `<div class="section"><div class="section-h">Transcript</div><div class="card transcript" id="liveFeed">${body}</div></div>`;
        wireHeader(active ? currentId : currentId);
        const feed = $("liveFeed"); if (feed) feed.scrollTop = feed.scrollHeight;
      }

      async function renderRecord(id) {
        record.innerHTML = '<div class="empty">Loading…</div>';
        let data = null;
        try { data = await (await fetch("/session?id=" + encodeURIComponent(id))).json(); } catch {}
        if (!data || data.error) { record.innerHTML = '<div class="empty">Could not load meeting.</div>'; return; }
        const m = meetings.find((x) => x.id === id) || { date: "", lines: 0, title: data.id };
        const title = (m.title || data.id).replace(/^(Meeting|Call) — /, "Meeting · ");
        const meta = `<span>${m.date || ""}</span><span>${m.lines} lines</span>`;
        const header = headerHtml(title, meta, { id, hasSummary: !!data.summary });
        const summary = data.summary
          ? `<div class="card summary-card"><div class="summary-body">${renderSummary(data.summary)}</div></div>`
          : `<div class="card summary-card"><div class="summary-empty">No summary yet. Generate one with <strong>Summarize meeting</strong>.</div></div>`;
        record.innerHTML =
          header +
          `<div class="section"><div class="section-h">Summary</div>${summary}</div>` +
          `<div class="section"><div class="section-h">Transcript</div><div class="card transcript">${parseTranscript(data.content)}</div></div>`;
        wireHeader(id);
      }

      function wireHeader(id) {
        const sBtn = $("summarizeBtn");
        if (sBtn) sBtn.onclick = () => summarize(id, sBtn);
        const eBtn = $("endBtn");
        if (eBtn) eBtn.onclick = endStartToggle;
        const mBtn = $("muteBtn");
        if (mBtn) mBtn.onclick = () => fetch("/control/mute?on=" + (!muted), { method: "POST" }).catch(() => {});
        const uBtn = $("unmuteBannerBtn");
        if (uBtn) uBtn.onclick = () => fetch("/control/mute?on=false", { method: "POST" }).catch(() => {});
      }

      async function summarize(id, btn) {
        if (!id) { toast("Start talking first — nothing to summarize yet."); return; }
        const label = btn.textContent; btn.disabled = true; btn.textContent = "Summarizing…";
        try {
          const r = await (await fetch("/summarize?id=" + encodeURIComponent(id), { method: "POST" })).json();
          if (r.summary) {
            toast("Summary ready");
            btn.textContent = "Re-summarize"; btn.disabled = false;
            if (viewingLive()) {
              // Update summary in-place so the live transcript feed isn’t disrupted
              liveSummary = r.summary;
              const card = document.querySelector(".summary-card");
              if (card) card.innerHTML = `<div class="summary-body">${renderSummary(r.summary)}</div>`;
              else renderLive(); // summary card missing (first load) — rebuild the view
            } else {
              renderRecord(id);
            }
            await refreshList();
          } else { toast("Couldn’t summarize"); btn.disabled = false; btn.textContent = label; }
        } catch { toast("Couldn’t summarize"); btn.disabled = false; btn.textContent = label; }
      }

      // ---------- session control ----------
      async function endStartToggle() {
        sessionBtn.disabled = true;
        try { await fetch(active ? "/control/end" : "/control/start", { method: "POST" }); } catch {}
        sessionBtn.disabled = false;
      }
      sessionBtn.onclick = endStartToggle;
      searchInput.oninput = renderList;

      // ---------- mic switcher ----------
      async function loadMicDevices() {
        try {
          const devices = await (await fetch("/devices")).json();
          micSelect.innerHTML = "";
          for (const d of devices) {
            const opt = document.createElement("option");
            opt.value = d.name;
            opt.textContent = d.name;
            micSelect.appendChild(opt);
          }
          // Mark the current active device (server sends it in meta event)
          if (activeMicDevice) micSelect.value = activeMicDevice;
        } catch {}
      }
      micSelect.onchange = async () => {
        const device = micSelect.value;
        micSelect.disabled = true;
        try {
          const r = await (await fetch("/control/mic?device=" + encodeURIComponent(device), { method: "POST" })).json();
          if (r.ok) { toast("Mic: " + device); activeMicDevice = device; }
          else { toast("Couldn't switch mic"); micSelect.value = activeMicDevice; }
        } catch { toast("Couldn't switch mic"); micSelect.value = activeMicDevice; }
        micSelect.disabled = false;
      };

      // ---------- live event stream ----------
      function handle(ev) {
        if (ev.type === "meta") {
          agentName = ev.agentName || agentName;
          if (ev.activeMic && ev.activeMic !== activeMicDevice) { activeMicDevice = ev.activeMic; micSelect.value = activeMicDevice; }
          if (viewingLive()) renderMain();
        }
        else if (ev.type === "session") {
          active = ev.active; if (ev.id) currentId = ev.id;
          sessionBtn.textContent = active ? "End session" : "Start session";
          sessionBtn.dataset.active = String(active);
          sessionBtn.querySelector(".rec") || sessionBtn.insertAdjacentHTML("afterbegin", '<span class="rec"></span>');
          refreshList().then(() => { if (viewingLive()) renderMain(); });
        } else if (ev.type === "muted") {
          muted = ev.muted; if (viewingLive()) renderLive();
        } else if (ev.type === "reset") {
          liveLines = []; interimText = ""; liveSummary = null; if (viewingLive()) renderLive();
        } else if (ev.type === "state") {
          ottoState = ev.state; const st = document.querySelector(".status"); if (st && viewingLive()) { st.dataset.state = ev.state; st.lastChild.textContent = `${agentName} · ${ev.state}`; }
        } else if (ev.type === "line") {
          liveLines.push(ev);
          if (viewingLive()) {
            const feed = $("liveFeed");
            if (feed) {
              const wasEmpty = feed.querySelector(".empty");
              if (wasEmpty) feed.innerHTML = "";
              feed.insertAdjacentHTML("beforeend", transcriptRow(ev.speaker, ev.text, ev.searched, ev.sources, false));
              feed.scrollTop = feed.scrollHeight;
            } else renderLive();
          }
        }
      }

      // ---------- boot ----------
      const params = new URLSearchParams(location.search);
      if (params.has("preview")) {
        // Dev/preview + screenshot aid (never used in production runtime).
        // ?preview renders a static dashboard. Add &beat=N to show only the first
        // N transcript lines and &state=listening|thinking|speaking for the status.
        agentName = "Otto"; active = true; currentId = "live";
        meetings = [
          { id: "live", title: "Call — now", date: "2026-06-10 15:40", lines: 4, hasSummary: false },
          { id: "a-meeting.md", title: "Meeting — Q3 launch sync", date: "2026-06-08 10:02", lines: 88, hasSummary: true },
          { id: "b-meeting.md", title: "Meeting — Pricing review", date: "2026-06-05 14:30", lines: 132, hasSummary: true },
        ];
        const script = [
          { kind: "speech", speaker: "Priya", text: "Okay, before we wrap up, did we ever lock in a date for the customer webinar?" },
          { kind: "speech", speaker: "Marcus", text: "I think we said the 20th, but I'm not totally sure it got confirmed." },
          { kind: "speech", speaker: "You", text: "Otto, when did we decide the webinar was?" },
          { kind: "agent", speaker: "Otto", text: "You set it for Thursday the 20th in last week's planning call, right after the budget sign off." },
        ];
        const beat = params.has("beat") ? Math.max(0, Number(params.get("beat"))) : script.length;
        liveLines = script.slice(0, beat);
        ottoState = params.get("state") || "listening";
        renderList(); renderMain();
      } else {
        const openId = params.get("open"); // deep-link to a specific meeting record
        if (openId) selectedId = openId;
        refreshList().then(() => renderMain());
        loadMicDevices();
        const es = new EventSource("/events");
        es.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch {} };
      }
    </script>
  </body>
</html>
